<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #ffffffe8; font-family: 'Inter', sans-serif; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(52, 1fr);
            gap: 2px;
        }
        .week-box { width: 5px; height: 5px; border-radius: 50%; }
        
        /* අතීත සති - Dark Glassy Red */
        .lived { 
            background-color: rgba(129, 15, 15, 0.4); 
            box-shadow: inset 0 0 5px rgba(255, 0, 0, 0.1);
            border: 0.5px solid rgba(255, 0, 0, 0.2);
        } 
        
        /* වර්තමාන සතිය - Highlighted Red */
        .current { 
            background-color: #ff0000; 
            box-shadow: 0 0 10px #ff0000, 0 0 20px rgba(255, 0, 0, 0.5);
            transform: scale(1.3);
            z-index: 10;
        }

        /* ඉතිරි සති - අළු පාට */
        .remaining { background-color: #222; } 
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-10">

    <div id="calendar" class="grid-container"></div>
    
    <div class="mt-8 text-center">
        <h1 id="age-text" class="text-xl font-light tracking-widest uppercase">My Life</h1>
        <p id="stats" class="text-gray-400 text-sm mt-2 font-mono"></p>
        <p id="left" class="text-red-800 text-xs mt-1 font-bold uppercase tracking-tighter"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const birthday = urlParams.get('birthday') || '2004-07-20'; 
        
        const birthDate = new Date(birthday);
        const today = new Date();
        const totalYears = 80;
        const totalWeeks = totalYears * 52;

        const diffInMs = today - birthDate;
        const livedWeeks = Math.floor(diffInMs / (1000 * 60 * 60 * 24 * 7));
        const weeksLeft = totalWeeks - livedWeeks;

        const calendar = document.getElementById('calendar');
        for (let i = 0; i < totalWeeks; i++) {
            const box = document.createElement('div');
            
            if (i < livedWeeks) {
                box.className = 'week-box lived';
            } else if (i === livedWeeks) {
                box.className = 'week-box current'; // හරියටම අද සතිය
            } else {
                box.className = 'week-box remaining';
            }
            
            calendar.appendChild(box);
        }

        document.getElementById('stats').innerText = `${livedWeeks} weeks lived.`;
        document.getElementById('left').innerText = `${weeksLeft} weeks left in your 80-year journey.`;
    </script>
</body>
</html>
