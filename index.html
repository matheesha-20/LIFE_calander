<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Calendar Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-h-screen: 100vh;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(52, 1fr);
            gap: 2.5px;
            max-width: 85vw;
        }

        .week-box { width: 4.5px; height: 4.5px; border-radius: 50%; }
        
        /* Past: Dark Glassy Red */
        .lived { 
            background-color: rgba(129, 15, 15, 0.44); 
            border: 0.5px solid rgba(255, 0, 0, 0.153);
        } 
        
        /* Current: Glowing Red */
        .current { 
            background-color: #ff0000; 
            box-shadow: 0 0 10px #ff0000;
            transform: scale(1.4);
            animation: pulse 2s infinite;
        }

        /* Future: Dark Gray */
        .remaining { background-color: #161616; } 

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1.4); }
            50% { opacity: 0.6; transform: scale(1.6); }
        }

        /* Progress Bar එක කොට කරලා ලස්සන කරන්න */
        .mini-progress-container {
            width: 60px; /* ගොඩක් කොට කළා */
            height: 2px;
            background: #1a1a1a;
            border-radius: 10px;
            margin: 10px auto;
            overflow: hidden;
        }
    </style>
</head>
<body class="p-6">

    <div id="calendar" class="grid-container"></div>
    
    <div class="mt-10 text-center">
        <p id="stats" class="text-[10px] tracking-[0.2em] text-gray-500 font-light uppercase"></p>
        
        <div class="mini-progress-container">
            <div id="progress-bar" class="h-full bg-red-700"></div>
        </div>

        <p id="left-percent" class="text-[12px] text-red-600 font-bold tracking-widest mt-1"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const birthday = urlParams.get('birthday') || '2004-07-20'; 
        
        const birthDate = new Date(birthday);
        const today = new Date();
        const totalWeeks = 100 * 52;

        const diffInMs = today - birthDate;
        const livedWeeks = Math.floor(diffInMs / (1000 * 60 * 60 * 24 * 7));
        
        const livedPercentage = ((livedWeeks / totalWeeks) * 100).toFixed(1);
        const leftPercentage = (100 - livedPercentage).toFixed(1);

        const calendar = document.getElementById('calendar');
        for (let i = 0; i < totalWeeks; i++) {
            const box = document.createElement('div');
            if (i < livedWeeks) box.className = 'week-box lived';
            else if (i === livedWeeks) box.className = 'week-box current';
            else box.className = 'week-box remaining';
            calendar.appendChild(box);
        }

        // පෙන්වන දත්ත
        // document.getElementById('stats').innerText = `${livedWeeks} WEEKS (${livedPercentage}%)`;
        document.getElementById('left-percent').innerText = `${leftPercentage}% WEEKS LEFT`;
        document.getElementById('progress-bar').style.width = `${livedPercentage}%`;
    </script>
</body>
</html>
