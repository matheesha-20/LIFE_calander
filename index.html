<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Calendar Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: transparent; /* විජට් එකට ගැලපෙන්න transparent කළා */
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* වම් පැත්තට align කළා */
            justify-content: flex-start;
            padding: 10px;
            margin: 0;
            height: auto;
        }
        
        .grid-container {
            display: grid;
            /* විජට් එකේ පළලට අනුව සති ගණන (repeat) වෙනස් කරන්න පුළුවන් */
            grid-template-columns: repeat(26, 1fr); 
            gap: 3px;
            width: fit-content;
        }

        .week-box { 
            width: 5px; 
            height: 5px; 
            border-radius: 50%; 
        }
        
        .lived { 
            background-color: rgba(129, 15, 15, 0.6); 
            border: 0.5px solid rgba(255, 0, 0, 0.2);
        } 
        
        .current { 
            background-color: #ff0000; 
            box-shadow: 0 0 8px #ff0000;
            transform: scale(1.2);
            animation: pulse 2s infinite;
        }

        .remaining { background-color: #222; } 

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1.2); }
            50% { opacity: 0.6; transform: scale(1.4); }
        }

        .mini-progress-container {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            margin-top: 15px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="calendar" class="grid-container"></div>
    
    <div class="mt-4 w-full">
        <p id="left-percent" class="text-[10px] text-red-600 font-bold tracking-widest"></p>
        <div class="mini-progress-container">
            <div id="progress-bar" class="h-full bg-red-700"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const birthday = urlParams.get('birthday') || '2004-07-20'; 
        
        const birthDate = new Date(birthday);
        const today = new Date();
        const totalWeeks = 80 * 52;

        const diffInMs = today - birthDate;
        const livedWeeks = Math.floor(diffInMs / (1000 * 60 * 60 * 24 * 7));
        
        const livedPercentage = ((livedWeeks / totalWeeks) * 100).toFixed(1);
        const leftPercentage = (100 - livedPercentage).toFixed(1);

        const calendar = document.getElementById('calendar');
        for (let i = 0; i < totalWeeks; i++) {
            const box = document.createElement('div');
            if (i < livedWeeks) box.className = 'week-box lived';
            else if (i === livedWeeks) box.className = 'week-box current';
            else box.className = 'week-box remaining';
            calendar.appendChild(box);
        }

        document.getElementById('left-percent').innerText = `${leftPercentage}% LEFT`;
        document.getElementById('progress-bar').style.width = `${livedPercentage}%`;
    </script>
</body>
</html>
